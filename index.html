<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#F26722">
<title>Payroll Learning</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
 --orange:#F26722; --orange-deep:#C74E12; --ink:#231A15; --ink-soft:#6B5E56;
 --paper:#FBF6F0; --card:#FFFFFF; --line:#EBDFD4;
 --green:#1F8A4C; --green-bg:#E3F3E9; --amber:#B07500; --amber-bg:#FBF0D9;
 --red:#C0392B; --red-bg:#FBE5E1; --blue:#2E75B6; --blue-bg:#E4EEF8;
 --r:14px; --shadow:0 1px 3px rgba(35,26,21,.08);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{-webkit-text-size-adjust:100%}
body{font-family:'Hanken Grotesk',system-ui,sans-serif;background:var(--paper);color:var(--ink);
 padding-bottom:calc(72px + env(safe-area-inset-bottom));font-size:15px;line-height:1.45}
h1,h2,h3,.serif{font-family:'Fraunces',Georgia,serif}
button{font:inherit;border:none;background:none;cursor:pointer;color:inherit}
a{color:var(--blue)}
header{position:sticky;top:0;z-index:40;background:var(--orange);color:#fff;
 padding:calc(10px + env(safe-area-inset-top)) 16px 12px}
.hrow{display:flex;align-items:center;gap:12px}
.hride{flex:1;min-width:0}
header h1{font-size:20px;font-weight:700}
header .sub{font-size:11.5px;opacity:.9;margin-top:1px}
.ring{position:relative;width:48px;height:48px;flex:none}
.ring svg{transform:rotate(-90deg)}
.ring .pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
.hbtn{width:34px;height:34px;border-radius:10px;background:rgba(255,255,255,.18);color:#fff;
 font-size:16px;font-weight:700;flex:none;display:flex;align-items:center;justify-content:center}
.searchwrap{padding:10px 16px 4px}
.search{width:100%;padding:11px 14px;border-radius:12px;border:1.5px solid var(--line);
 background:var(--card);font:inherit;font-size:15px;box-shadow:var(--shadow)}
.search:focus{outline:none;border-color:var(--orange)}
main{padding:8px 14px 24px}
.section-title{font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
 color:var(--ink-soft);margin:18px 2px 8px}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);
 box-shadow:var(--shadow);margin-bottom:10px;overflow:hidden}
.chead{display:flex;align-items:flex-start;gap:10px;padding:13px 14px;width:100%;text-align:left}
.cid{font-size:10.5px;font-weight:700;color:var(--orange-deep);letter-spacing:.06em;flex:none;
 background:#FDEDE3;border-radius:6px;padding:3px 6px;margin-top:1px}
.ctitle{flex:1;font-weight:600;font-size:14.5px;line-height:1.35}
.cday{font-size:11px;color:var(--ink-soft);margin-top:2px;font-weight:500}
.chev{flex:none;color:var(--ink-soft);transition:transform .2s;margin-top:2px}
.card.open .chev{transform:rotate(90deg)}
.cbody{display:none;padding:0 14px 14px;border-top:1px dashed var(--line)}
.card.open .cbody{display:block}
.pblock{white-space:pre-wrap;font-size:13.5px;line-height:1.5;color:#3E332C;
 background:#FBF6F0;border-radius:10px;padding:11px 12px;margin-top:10px;word-break:break-word}
.sapblock{background:#F0F5FB;border-left:3px solid var(--blue)}
.saptag{display:block;font-size:11px;font-weight:800;letter-spacing:.08em;color:var(--blue);margin-bottom:6px}
.meta{font-size:12.5px;color:var(--ink-soft);margin-top:8px}
.meta b{color:var(--ink)}
.chips{display:flex;gap:8px;align-items:center;margin-top:12px;flex-wrap:wrap}
.chip{padding:7px 13px;border-radius:999px;font-size:12.5px;font-weight:700}
.chip.ns{background:var(--red-bg);color:var(--red)}
.chip.ip{background:var(--amber-bg);color:var(--amber)}
.chip.ln{background:var(--green-bg);color:var(--green)}
.datechip{font-size:11.5px;color:var(--ink-soft)}
.notes{width:100%;margin-top:10px;padding:9px 11px;border-radius:10px;border:1.5px solid var(--line);
 font:inherit;font-size:13px;min-height:38px;resize:vertical;background:#fff}
.notes:focus{outline:none;border-color:var(--orange)}
.sdot{width:10px;height:10px;border-radius:50%;flex:none;margin-top:6px}
.sdot.ns{background:var(--red)}.sdot.ip{background:var(--amber)}.sdot.ln{background:var(--green)}
.tcline{margin-top:8px;display:flex;flex-wrap:wrap;gap:5px}
.tct{font-size:10.5px;font-weight:700;background:#EFE7FA;color:#5B21B6;border-radius:6px;padding:3px 7px}
.stepwrap{margin-top:10px;padding-top:10px;border-top:1px dashed var(--line)}
.stepwrap:first-child{border-top:none;padding-top:0}
.stepno{font-size:11px;font-weight:800;letter-spacing:.06em;color:var(--orange-deep);margin-bottom:6px}
.cols{display:flex;flex-direction:column;gap:8px}
.colbox{background:#FBF6F0;border-radius:10px;padding:10px 12px}
.colbox.sap{background:#F0F5FB;border-left:3px solid var(--blue)}
.collab{display:block;font-size:10px;font-weight:800;letter-spacing:.09em;color:var(--ink-soft);margin-bottom:4px}
.coltext{white-space:pre-wrap;font-size:13.5px;line-height:1.5;color:#3E332C;word-break:break-word}
.steprow{display:flex;gap:14px;margin-top:6px}
.ministep{font-size:12px;font-weight:700;color:var(--ink-soft)}
@media (min-width:560px){ .cols.two{flex-direction:row} .cols.two .colbox{flex:1;min-width:0} }
.caltitle{font-family:'Fraunces',serif;font-size:20px;font-weight:700;color:var(--ink);margin:8px 2px 2px}
.calsub{font-size:12px;color:var(--ink-soft);margin:0 2px 10px}
.legend{display:flex;gap:14px;margin:0 2px 12px;font-size:11.5px;color:var(--ink-soft);font-weight:600}
.legend span{display:flex;align-items:center;gap:5px}
.legend i{width:9px;height:9px;border-radius:50%;display:block}
.legend i.ns{background:var(--red)}.legend i.ip{background:var(--amber)}.legend i.ln{background:var(--green)}
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:7px;padding:2px 0 10px}
.dcell{border-radius:14px;background:var(--card);border:1px solid var(--line);
 padding:9px 3px 7px;text-align:center;min-height:58px;position:relative;overflow:hidden;
 box-shadow:0 1px 2px rgba(35,26,21,.05);transition:transform .1s}
.dcell:active{transform:scale(.95)}
.dcell::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:transparent}
.dcell.bar-ns::before{background:var(--red)}
.dcell.bar-ip::before{background:var(--amber)}
.dcell.bar-ln::before{background:var(--green)}
.dcell .dn{font-family:'Fraunces',serif;font-size:16px;font-weight:700;color:var(--ink)}
.dcell.mute .dn{color:#CFC4B8}
.dcell .dd{display:flex;gap:3px;justify-content:center;align-items:center;margin-top:5px;flex-wrap:wrap;min-height:9px}
.dcell .dd i{width:7px;height:7px;border-radius:50%;display:block}
.dcell .dd i.ns{background:var(--red)}.dcell .dd i.ip{background:var(--amber)}.dcell .dd i.ln{background:var(--green)}
.dcell .dd .more{font-size:8px;font-weight:800;color:var(--ink-soft)}
.dcell.has{border-color:#E8D3BF;background:#FFFDFB}
.dcell.mute{background:#F7F1EA;box-shadow:none}
.dcell.sel{border-color:var(--orange);background:#FDEDE3;box-shadow:0 0 0 2px rgba(242,103,34,.3);transform:scale(1.04)}
.dcell .dc{position:absolute;top:4px;right:6px;font-size:9px;font-weight:800;color:#fff;background:var(--orange);
 border-radius:8px;min-width:15px;height:15px;line-height:15px;padding:0 3px}
.flexbtn{width:100%;margin:2px 0 12px;padding:12px;border-radius:14px;border:1.5px dashed var(--orange-deep);
 background:#FDEDE3;color:var(--orange-deep);font-weight:700;font-size:13.5px}
.flexbtn.sel{background:var(--orange);color:#fff;border-style:solid}
.tctable{border:1px solid var(--line);border-radius:12px;overflow:hidden;box-shadow:var(--shadow);background:var(--card)}
.tctr{display:flex;border-bottom:1px solid var(--line)}
.tctr:last-child{border-bottom:none}
.tchead{background:var(--ink);color:#fff;font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase}
.tccode{flex:none;width:38%;padding:11px 12px;font-family:ui-monospace,Menlo,monospace;font-size:13px;
 font-weight:700;color:var(--orange-deep);border-right:1px solid var(--line);word-break:break-word}
.tchead .tccode{color:#fff;font-family:'Hanken Grotesk',sans-serif}
.tcdesc{flex:1;padding:11px 12px;font-size:13px;line-height:1.45;color:#3E332C;word-break:break-word}
.tcdesc b{color:var(--ink)}
.tchead .tcdesc{color:#fff}
.tcacts{display:flex;gap:12px;margin-top:8px}
.addbtn{width:100%;margin:2px 0 12px;padding:12px;border-radius:12px;border:1.5px dashed var(--line);
 background:var(--card);color:var(--orange-deep);font-weight:700;font-size:13.5px}
.addform{padding:6px 14px 14px}
.addform input,.addform textarea{width:100%;margin-top:8px;padding:10px 12px;border-radius:10px;
 border:1.5px solid var(--line);font:inherit;font-size:14px;background:#fff}
.addform textarea{min-height:70px;resize:vertical}
.addform input:focus,.addform textarea:focus{outline:none;border-color:var(--orange)}
.formrow{display:flex;gap:8px;margin-top:10px}
.savebtn{flex:1;padding:12px;border-radius:12px;background:var(--orange);color:#fff;font-weight:700;font-size:14px}
.cancelbtn{flex:1;padding:12px;border-radius:12px;background:var(--paper);color:var(--ink-soft);font-weight:700;font-size:14px;border:1.5px solid var(--line)}
.delbtn{font-size:12px;font-weight:700;color:var(--red);margin-top:10px}
.qrow{display:flex;gap:10px;padding:12px 14px;align-items:flex-start}
.qtext{flex:1;font-size:14px;line-height:1.4}
.qnote{font-size:12px;color:var(--ink-soft);margin-top:3px;white-space:pre-wrap}
.qbtn{flex:none;padding:7px 12px;border-radius:999px;font-size:12px;font-weight:700}
.qbtn.open{background:var(--red-bg);color:var(--red)}
.qbtn.closed{background:var(--green-bg);color:var(--green)}
.ansbox{width:100%;margin:0 0 10px;padding:8px 11px;border-radius:10px;border:1.5px solid var(--line);font:inherit;font-size:13px;background:#fff}
.gcard{padding:13px 14px}
.gcov{font-size:11px;font-weight:800;letter-spacing:.05em;border-radius:6px;padding:3px 8px;display:inline-block}
.gcov.NOTCOVERED{background:var(--red-bg);color:var(--red)}
.gcov.Partly{background:var(--amber-bg);color:var(--amber)}
.gcov.Covered{background:var(--green-bg);color:var(--green)}
.gwhere{font-size:12.5px;color:var(--ink-soft);margin-top:6px}
.vcard{padding:13px 14px}
.vt{font-weight:700;font-size:14px}
.vtag{font-size:11px;color:var(--orange-deep);font-weight:700;margin-top:2px}
.vc{font-size:13px;color:var(--ink-soft);margin-top:4px}
.vlink{display:inline-block;margin-top:8px;font-size:13px;font-weight:700;color:#fff;background:var(--orange);border-radius:9px;padding:7px 14px}
.icard{padding:13px 14px}
.icard .in{font-family:'Fraunces',serif;font-size:15px;font-weight:700;color:var(--orange-deep)}
.icard p{font-size:13.5px;margin-top:5px;color:#3E332C}
nav{position:fixed;bottom:0;left:0;right:0;z-index:50;background:#fff;border-top:1px solid var(--line);
 display:flex;padding-bottom:env(safe-area-inset-bottom)}
nav button{flex:1;padding:9px 0 7px;display:flex;flex-direction:column;align-items:center;gap:2px;
 font-size:10.5px;font-weight:600;color:var(--ink-soft)}
nav button.on{color:var(--orange-deep)}
nav .ico{font-size:19px;line-height:1}
.morelist{padding:4px 0}
.morelist button{display:flex;width:100%;text-align:left;padding:15px 16px;gap:12px;align-items:center;
 border-bottom:1px solid var(--line);font-size:15px;font-weight:600;background:var(--card)}
.morelist .mic{font-size:20px;width:28px;text-align:center}
.morelist .mcount{margin-left:auto;font-size:12px;color:var(--ink-soft);font-weight:500}
.back{display:inline-flex;align-items:center;gap:6px;font-size:13.5px;font-weight:700;color:var(--orange-deep);margin:6px 0 4px;padding:6px 2px}
.empty{padding:36px 16px;text-align:center;color:var(--ink-soft);font-size:14px}
.toast{position:fixed;left:50%;bottom:calc(86px + env(safe-area-inset-bottom));transform:translateX(-50%);
 background:var(--ink);color:#fff;font-size:13px;font-weight:600;padding:9px 18px;border-radius:999px;
 opacity:0;transition:opacity .25s;pointer-events:none;z-index:60;white-space:nowrap}
.toast.show{opacity:1}
.hint{font-size:12.5px;color:var(--ink-soft);background:#F4EADF;border-radius:10px;padding:10px 12px;margin:4px 0 12px;line-height:1.45}
.sudlist{counter-reset:s}
.sudlist .card{padding:12px 14px;display:flex;gap:12px}
.sudlist .card::before{counter-increment:s;content:counter(s);font-family:'Fraunces',serif;font-weight:700;color:var(--orange);font-size:15px;flex:none;width:22px}
.vrow{padding:12px 14px}
.vlabel{font-weight:700;font-size:14px}
.vfield{display:flex;gap:8px;align-items:center;margin-top:6px;font-size:13px}
.vfield .vk{color:var(--ink-soft);width:58px;flex:none}
.vfield .vv{font-family:ui-monospace,Menlo,monospace;flex:1;word-break:break-all}
.veye{flex:none;font-size:15px;padding:4px 8px;border-radius:8px;background:var(--paper)}
@media (min-width:700px){main,.searchwrap{max-width:640px;margin:0 auto}}
</style>
</head>

function load(){
  try{ const raw = localStorage.getItem('payrollLearn_v1'); if(raw){ const p=JSON.parse(raw);
    const seed = mem.myvideos;
    mem = Object.assign(mem, p);
    mem.custom = Object.assign({pay:[],other:[],sap:[],tc:[]}, p.custom||{});
    mem.edits = p.edits||{}; mem.deleted = p.deleted||{}; mem.steps = p.steps||{};
    mem.covered = p.covered||{}; mem.todos = p.todos||[]; mem.sections = p.sections||[]; mem.colmap = p.colmap||{};
    mem.qedit = p.qedit||{}; mem.customq = p.customq||[]; mem.hiddenMenu = p.hiddenMenu||{}; mem.menuLabel = p.menuLabel||{}; mem.pics = p.pics||[]; mem.picFolders = p.picFolders||[];
    mem.myvideos = p.myvideos || seed;
  }}catch(e){}
}
function save(){ try{ localStorage.setItem('payrollLearn_v1', JSON.stringify(mem)); }catch(e){} }

/* seed your recorded training videos once (idempotent by URL) */
var DEFAULT_VIDEOS = [
  {name:"Salary Posting - recording", url:"https://youtu.be/O9kvNzwcQsU", note:"Training session recording"},
  {name:"Training recording 2", url:"https://youtu.be/YHTRwe9xz3c", note:"Training session recording"},

];
(function ensureDefaultVideos(){
  mem.myvideos = mem.myvideos || [];
  var changed=false;
  DEFAULT_VIDEOS.forEach(function(d){
    var url=d.url.trim();
    var exists = mem.myvideos.some(function(v){ return (v.url||'').trim()===url; });
    // also fill the empty "Salary Posting" placeholder if present
    var ph = mem.myvideos.find(function(v){ return !(v.url||'').trim() && /salary posting/i.test(v.name||''); });
    if(!exists){
      if(ph && d.url===DEFAULT_VIDEOS[0].url){ ph.url=url; ph.name=d.name; ph.note=d.note; changed=true; }
      else { mem.myvideos.push(Object.assign({}, d)); changed=true; }
    }
  });
  if(changed) save();
})();
function getStatus(id){ return (mem.status[id]&&mem.status[id].s) || "Not Started"; }
function getDate(id){ return (mem.status[id]&&mem.status[id].d) || ""; }
function setStatus(id, s){
  mem.status[id] = {s:s, d: s==="Learned" ? todayStr() : (s==="Not Started"?"":(getDate(id)||todayStr()))};
  save(); refreshRing();
}
function todayStr(){
  const dt=new Date(); const m=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

}

function customList(kind){ return (mem.custom && mem.custom[kind]) || []; }

function isDel(id){ return !!mem.deleted[id]; }
function allTrackIds(){
  return D.pd.map(x=>x.id).concat(D.op.map(x=>x.id))
    .concat(customList('pay').map(x=>x.id)).concat(customList('other').map(x=>x.id))
    .filter(id=>!isDel(id));
}
function refreshRing(){
  const ids = allTrackIds();
  const learned = ids.filter(i=>getStatus(i)==="Learned").length;
  const pct = ids.length ? Math.round(100*learned/ids.length) : 0;
  document.getElementById('ringFg').style.strokeDashoffset = 125.6*(1-(ids.length?learned/ids.length:0));
  document.getElementById('ringPct').textContent = pct+"%";
  document.getElementById('hsub').textContent =
    learned+" of "+ids.length+" works learned \u00b7 "+
    ids.filter(i=>getStatus(i)==="In Progress").length+" in progress";
}

/* day helpers */
function itemDays(x){
  if(x.days) return x.days;
  if(x.custom) return [];
  return D.dayMap[x.id] || [];
}
function dayLabelOf(x){
  if(x.days && x.days.length) return x.days.map(ordJs).join("\u2013");
  if(x.custom) return "Flexible";
  return D.dayLabel[x.id] || "";
}
function ordJs(n){ const s=["th","st","nd","rd"], v=n%100; return n+(s[(v-20)%10]||s[v]||s[0]); }
function allDayItems(){
  const arr = [];
  D.pd.forEach(x=>{ if(!isDel(x.id)) arr.push(Object.assign({cat:'Payroll'}, eff(x))); });
  D.op.forEach(x=>{ if(!isDel(x.id)) arr.push(Object.assign({cat:'Other'}, eff(x))); });
  customList('pay').forEach(x=>{ if(!isDel(x.id)) arr.push(Object.assign({cat:'Payroll',custom:true},x)); });
  customList('other').forEach(x=>{ if(!isDel(x.id)) arr.push(Object.assign({cat:'Other',custom:true},x)); });
  return arr;
}

        '</div>'+

  });

      (kind==='sap'?'':'<textarea id="seSap" placeholder="SAP for this step (optional)"></textarea>')+

  } else {
    h += '<button class="addbtn" style="margin:6px 0 4px;padding:9px" data-stepadd="'+x.id+'::'+kind+'">&#65291; Add step</button>';
  }

}

/* ---------- Calendar tab ---------- */
function dayActsAll(dn){
  return allDayItems().filter(x => dn==='flex' ? itemDays(x).length===0 : itemDays(x).includes(dn));
}
function renderCal(){
  let cal = '<div class="cal">';
  for(let dn=1; dn<=31; dn++){
    const here = dayActsAll(dn);
    const cls = ['dcell']; if(here.length)cls.push('has'); else cls.push('mute');
    if(selDay===dn)cls.push('sel');
    // dominant status colour for the day's left bar
    let dom = 'none';
    if(here.length){
      const st = here.map(i=>getStatus(i.id));
      if(st.every(s=>s==='Learned')) dom='ln';
      else if(st.some(s=>s!=='Not Started')) dom='ip';
      else dom='ns';
    }
    cal += '<button class="'+cls.join(' ')+' bar-'+dom+'" data-day="'+dn+'">'+
      (here.length?'<span class="dc">'+here.length+'</span>':'')+
      '<div class="dn">'+dn+'</div><div class="dd">'+
      here.slice(0,4).map(i=>'<i class="'+SCLASS[getStatus(i.id)]+'"></i>').join('')+
      (here.length>4?'<span class="more">+'+(here.length-4)+'</span>':'')+
      '</div></button>';
  }
  cal += '</div>';
  const flexN = dayActsAll('flex').length;
  cal += '<button class="flexbtn'+(selDay==='flex'?' sel':'')+'" data-day="flex">&#9711; Flexible / no fixed date \u00b7 '+flexN+'</button>';
  const legend = '<div class="legend">'+
    '<span><i class="ns"></i>Not started</span>'+
    '<span><i class="ip"></i>In progress</span>'+
    '<span><i class="ln"></i>Learned</span></div>';
  let html = '<div class="caltitle">Payroll cycle calendar</div>'+
    '<div class="calsub">21st \u2192 20th \u00b7 press a date to open that day\u2019s work</div>'+ legend + cal;

  if(selDay===null && !query){ app.innerHTML = html; return; }
  let items;
  if(query && selDay===null){ items = allDayItems(); html += '<div class="section-title">Search results</div>'; }
  else if(selDay==='flex'){ items = dayActsAll('flex'); html += '<div class="section-title">Flexible \u00b7 '+items.length+'</div>'; }
  else { items = dayActsAll(selDay); html += '<div class="section-title">'+ordJs(selDay)+' \u00b7 '+items.length+' works</div>'; }
  let shown=0;
  items.forEach(x=>{
    const st=getSteps(x);
    const hay = x.id+" "+x.activity+" "+st.map(s=>s.desc+" "+s.sap).join(" ")+" "+((x.tc||[]).join(" "));
    if(!matches(hay)) return; shown++;
    html += actCard(x, dayLabelOf(x)+' \u00b7 '+x.cat, x.cat==='Payroll'?pdBody(x):opBody(x));
  });
  if(!shown) html += '<div class="empty">'+(selDay?'No work on this day.':'Nothing matches.')+'</div>';
  app.innerHTML = html;
}

    other: {title:'Other than payroll', base:D.op, body:opBody},
    sap:   {title:'SAP \u00b7 as in your sheet', base:D.st, body:stBody},
  }[kind];
  let html = '<div class="section-title">'+conf.title+'</div>' + addForm(kind);
  let shown=0;
  conf.base.forEach(x0=>{
    if(isDel(x0.id)) return;
    const x = eff(x0);
    const hay = x.id+" "+x.activity+" "+(x.process||x.details||x.steps||"")+" "+(x.sap||"")+" "+((x.tc||[]).join(" "));
    if(!matches(hay)) return; shown++;
    html += actCard(x, kind==='sap'?'':dayLabelOf(x), conf.body(x));
  });
  customList(kind).forEach(x=>{
    if(isDel(x.id)) return;
    const hay = x.activity+" "+(x.process||x.details||x.steps||"")+" "+(x.sap||"");
    if(!matches(hay)) return; shown++;
    const xc = Object.assign({custom:true},x);
    html += actCard(xc, kind==='sap'?'':dayLabelOf(xc), conf.body(xc));
  });
  if(!shown) html+='<div class="empty">Nothing matches.</div>';
  app.innerHTML = html;
}

/* ---------- shared import helpers (Excel + screenshot) ---------- */
function targetLabel(t){
  if(t==='pay') return 'Payroll'; if(t==='other') return 'Other'; if(t==='sap') return 'SAP'; if(t==='tc') return 'T-codes';
  if(t==='todo') return 'To-do'; if(t==='queries') return 'Queries';
  if(t && t.indexOf('sec:')===0){ var s=findSection(t.slice(4)); return s?s.name:'Section'; }
  return t;
}

/* from a name cell: first line = name, trailing number line = day, middle lines = rest */
function cleanDay(cell){
  const raw=String(cell==null?'':cell);
  let parts=raw.split('\n').map(s=>s.trim()).filter(s=>s!=='');
  let day=null;
  if(parts.length>1){
    const last=parts[parts.length-1];
    const m=last.match(/^(\d{1,2})/);
    if(m && +m[1]>=1 && +m[1]<=31){ day=+m[1]; parts=parts.slice(0,-1); }
  }
  return {name:(parts[0]||''), day:day, rest:parts.slice(1).join('\n')};
}
function joinNE(){ return [].slice.call(arguments).map(s=>(s==null?'':String(s)).trim()).filter(Boolean).join('\n'); }
function parseRows(target, rows){
  let start=0;
  if(rows.length){
    const c0=((rows[0][0]||'')+'').trim().toLowerCase();
    const labels=['name','activity','category','t-code','tcode','code','work','area','details'];
    const h=(rows[0].join(' ')).toLowerCase();
    let hits=0; ['category','activity','area','details','process','name','description','date','sent','contact','flexible','symbol'].forEach(w=>{ if(new RegExp('\\b'+w.replace('-','\\-?')+'\\b').test(h)) hits++; });
    if(labels.includes(c0) || hits>=2) start=1;
  }
  const out=[];
  for(let i=start;i<rows.length;i++){
    const c=rows[i]||[];
    const cell=k=>(c[k]==null?'':String(c[k]));
    if(target==='tc'){
      const code=(cell(1)||cell(0)).trim(); if(!code) continue;
      out.push({code:code, cat:cell(0).trim()||'Imported', desc:cell(2).trim()});
      continue;
    }
    if(target==='sap'){
      const nd=cleanDay(cell(0)); if(!nd.name) continue;
      out.push({name:nd.name, day:nd.day, process:'', sap:joinNE(cell(1),nd.rest), extra:joinNE(cell(4),cell(5))});
      continue;
    }
    if(target==='other'){
      const nd=cleanDay(cell(0)); if(!nd.name) continue;
      out.push({name:nd.name, day:nd.day, process:joinNE(nd.rest,cell(1)), timing:cell(2)});
      continue;
    }
    // pay: Activity | Process | date(when) | Sent | Contact
    const nd=cleanDay(cell(0)); if(!nd.name) continue;
    out.push({name:nd.name, day:nd.day, process:joinNE(nd.rest,cell(1)), when:cell(2), sent:cell(3), contact:cell(4)});
  }
  return out;
}

/* full list for a tab = built-in (seed) items + your added items */
function canonList(target){
  const seed = target==='pay'?D.pd : target==='other'?D.op : target==='sap'?D.st : target==='tc'?D.tcodes : [];
  const out=[];
  (seed||[]).forEach(x=>{ if(isDel(x.id)) return; out.push({id:x.id, name:(target==='tc'?(x.code||''):(x.activity||'')), seed:true, obj:x}); });
  customList(target).forEach(x=>{ if(isDel(x.id)) return; out.push({id:x.id, name:(target==='tc'?(x.code||''):(x.activity||'')), seed:false, obj:x}); });
  return out;
}
function normName(s){ return (s==null?'':String(s)).trim().toLowerCase().replace(/\s+/g,' '); }
function findMatch(target, name){
  const key=normName(name); if(!key) return null;
  const list=canonList(target);
  let hit=list.find(c=>normName(c.name)===key); if(hit) return hit;   // exact
  if(key.length>=10){                                                 // prefix either way
    hit=list.find(c=>{ const n=normName(c.name); return n.length>=10 && (n.startsWith(key)||key.startsWith(n)); });
    if(hit) return hit;
  }
  return null;
}
/* current steps of a matched item (your override if any, else built-in) */
function existingSteps(m){
  if(mem.steps[m.id]) return JSON.parse(JSON.stringify(mem.steps[m.id]));
  const s0 = (m.obj && m.obj.steps0) ? m.obj.steps0 : null;
  return s0 ? JSON.parse(JSON.stringify(s0)) : [];
}
/* append lines from `incoming` that aren't already in `existing` (trim + case-insensitive) */
function addLines(existing, incoming){
  const have = new Set((existing||'').split('\n').map(l=>l.trim().toLowerCase()).filter(Boolean));
  const add = (incoming||'').split('\n').filter(l=>{ const k=l.trim().toLowerCase(); return k && !have.has(k); });
  if(!add.length) return existing||'';
  return (existing && existing.trim()) ? (existing.replace(/\s+$/,'')+'\n'+add.join('\n')) : add.join('\n');
}
function applyParsed(target, parsed, mode){
  mem.custom[target] = mem.custom[target] || [];
  if(mode==='replace'){
    mem.custom[target].forEach(it=>{ if(it.id) delete mem.steps[it.id]; });
    mem.custom[target] = [];
  }
  let added=0, updated=0;
  parsed.forEach((r,idx)=>{
    if(target==='tc'){
      const m = (mode==='merge') ? findMatch('tc', r.code) : null;
      if(m){
        if(m.seed) mem.edits[m.id]=Object.assign(mem.edits[m.id]||{}, {cat:r.cat, desc:r.desc});
        else { m.obj.cat=r.cat; m.obj.desc=r.desc; }
        updated++;
      } else { mem.custom.tc.push({id:'MYTC-'+Date.now()+'-'+idx, cat:r.cat, code:r.code, desc:r.desc}); added++; }
      return;
    }
    const m = (mode==='merge') ? findMatch(target, r.name) : null;
    const patch={};
    if(r.day!=null) patch.days=[r.day];
    if(r.when && r.when.trim()) patch.when=r.when.trim();
    if(r.timing && r.timing.trim()) patch.timing=r.timing.trim();
    if(r.sent && r.sent.trim()) patch.sent=r.sent.trim();
    if(r.contact && r.contact.trim()) patch.contact=r.contact.trim();
    if(r.extra && r.extra.trim()) patch.extra=r.extra.trim();
    const hasBody = (r.process && r.process.trim()) || (r.sap && r.sap.trim());
    if(m){
      if(m.seed){ if(Object.keys(patch).length) mem.edits[m.id]=Object.assign(mem.edits[m.id]||{}, patch); }
      else { Object.assign(m.obj, patch); }
      if(hasBody){
        let steps = existingSteps(m);
        if(!steps.length) steps=[{desc:'',sap:''}];
        steps[0].desc = addLines(steps[0].desc, r.process);
        steps[0].sap  = addLines(steps[0].sap,  r.sap);
        mem.steps[m.id] = steps;
      }
      updated++;
    } else {
      const it={id:'MY-'+Date.now()+'-'+idx, activity:r.name, custom:true};
      if(target!=='sap') it.days = (r.day!=null)?[r.day]:[];
      ['when','timing','sent','contact','extra'].forEach(k=>{ if(patch[k]) it[k]=patch[k]; });
      mem.custom[target].push(it);
      mem.steps[it.id]=[{desc:r.process||'', sap:r.sap||''}];
      added++;
    }
  });
  save(); render();
  toast(mode==='replace' ? ('Replaced \u2014 '+added+' saved') : (added+' added, '+updated+' updated'));
}

/* ---------- column mapping (remembered per sheet type) ---------- */
var MAPFIELDS = [['name','Name'],['process','Process'],['sap','SAP'],['day','Day (calendar)'],['when','When'],['timing','Timing'],['sent','Sent'],['contact','Contact'],['extra','Extra'],['ignore','Ignore']];
var MAPFIELDS_TC = [['code','T-Code'],['cat','Category'],['desc','Description'],['ignore','Ignore']];
function guessField(target, header){
  const h=(header==null?'':String(header)).toLowerCase();
  if(target==='tc'){
    if(/categor/.test(h)) return 'cat';
    if(/t-?code|code/.test(h)) return 'code';
    if(/desc/.test(h)) return 'desc';
    return 'ignore';
  }
  if(/contact/.test(h)) return 'contact';
  if(/sent|reference mail/.test(h)) return 'sent';
  if(/basic details|remark/.test(h)) return 'extra';
  if(/timing/.test(h)) return 'timing';
  if(/\bday\b/.test(h)) return 'day';
  if(/\bdate\b|when/.test(h)) return 'when';
  if(/process|detail|step|flexible/.test(h)) return (target==='sap'?'sap':'process');
  if(/\bsap\b/.test(h)) return 'sap';
  if(/area|activity|name|work/.test(h)) return 'name';
  return 'ignore';
}
function parseWithMap(target, rows, map){
  const out=[];
  for(let i=1;i<rows.length;i++){   // row 0 is the header we mapped
    const c=rows[i]||[];
    const get=f=>{ const parts=[]; for(let k=0;k<map.length;k++){ if(map[k]===f) parts.push(c[k]==null?'':String(c[k])); } return joinNE.apply(null, parts); };
    if(target==='tc'){
      const code=(get('code')||'').trim(); if(!code) continue;
      out.push({code:code, cat:(get('cat')||'Imported').trim(), desc:(get('desc')||'').trim()});
      continue;
    }
    const nd=cleanDay(get('name')); if(!nd.name) continue;
    let day=nd.day;
    const dcol=get('day'); if(dcol){ const m=String(dcol).match(/\b(\d{1,2})\b/); if(m&&+m[1]>=1&&+m[1]<=31) day=+m[1]; }
    out.push({ name:nd.name, day:day, process:joinNE(nd.rest, get('process')), sap:get('sap'),
      when:get('when'), timing:get('timing'), sent:get('sent'), contact:get('contact'), extra:get('extra') });
  }
  return out;
}
function mapUI(){
  if(!pendingXL) return;
  const target=pendingXL.target, header=pendingXL.rows[0]||[];
  const fields = target==='tc'?MAPFIELDS_TC:MAPFIELDS;
  const saved = (mem.colmap&&mem.colmap[target])||null;
  let rowsHtml='';
  header.forEach((h,idx)=>{
    const cur = (saved && saved.length===header.length) ? saved[idx] : guessField(target,h);
    const opts = fields.map(f=>'<option value="'+f[0]+'"'+(f[0]===cur?' selected':'')+'>'+f[1]+'</option>').join('');
    rowsHtml += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">'+
      '<div style="flex:1;font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(((h==null||h==='')?'(blank)':String(h)).split('\n')[0])+'</div>'+
      '<select data-mapcol="'+idx+'" style="flex:none;padding:8px 10px;border-radius:8px;border:1.5px solid var(--line);font:inherit;font-size:13px;background:#fff">'+opts+'</select></div>';
  });
  const ov=document.createElement('div');
  ov.id='mapov';
  ov.style.cssText='position:fixed;inset:0;z-index:100000;background:rgba(35,26,21,.45);display:flex;align-items:flex-end;justify-content:center;overflow:auto';
  ov.innerHTML='<div style="background:var(--paper);width:100%;max-width:520px;border-radius:18px 18px 0 0;padding:18px 16px calc(18px + env(safe-area-inset-bottom));box-shadow:0 -4px 24px rgba(0,0,0,.25)">'+
    '<div style="font-family:Fraunces,serif;font-size:18px;font-weight:700">Map your columns</div>'+
    '<div style="color:var(--ink-soft);font-size:13px;margin:4px 0 14px">Assign each column of your sheet to a field. Saved for <b>'+targetLabel(target)+'</b> so next time it\u2019s pre-filled.</div>'+
    rowsHtml+
    '<button class="savebtn" style="width:100%;margin-top:6px" data-mapgo="1">Continue</button>'+
    '<button class="cancelbtn" style="width:100%;margin-top:8px" data-mapcancel="1">Cancel</button></div>';
  ov.addEventListener('click', ev=>{
    if(ev.target.closest('[data-mapgo]')){
      if(!pendingXL){ ov.remove(); return; }
      const sels=ov.querySelectorAll('[data-mapcol]'); const map=[];
      sels.forEach(s=>{ map[+s.dataset.mapcol]=s.value; });
      const t=pendingXL.target, rws=pendingXL.rows;
      mem.colmap=mem.colmap||{}; mem.colmap[t]=map; save();
      const parsed=parseWithMap(t, rws, map);
      ov.remove(); pendingXL=null;
      if(!parsed.length){ toast('No usable rows found \u2014 check the Name mapping'); return; }
      importChooser(parsed.length, targetLabel(t), mode=>applyParsed(t, parsed, mode));
      return;
    }
    if(ev.target.closest('[data-mapcancel]') || ev.target===ov){ ov.remove(); pendingXL=null; return; }
  });
  document.body.appendChild(ov);
}

function fieldsFor(target){
  if(target==='tc') return MAPFIELDS_TC;
  if(target==='todo') return [['text','Text'],['ignore','Ignore']];
  if(target==='queries') return [['q','Question'],['note','Note'],['ignore','Ignore']];
  if(target && target.indexOf('sec:')===0) return [['title','Title'],['body','Body'],['ignore','Ignore']];
  return MAPFIELDS;
}
function guessLineField(target, line, idx){
  const t=(line||'').trim();
  if(target==='todo') return 'text';
  if(target==='queries') return idx===0 ? 'q' : 'note';
  if(target && target.indexOf('sec:')===0) return idx===0 ? 'title' : 'body';
  if(target==='tc'){ return idx===0 ? 'code' : 'desc'; }
  if(idx===0) return 'name';
  if(/^\d{1,2}$/.test(t) && +t>=1 && +t<=31) return 'day';
  var compact=t.replace(/\s/g,'');
  if(compact.length>=3 && compact.length<=30 && /[A-Z]/.test(compact) && /[0-9_\/]/.test(compact) && !/\s/.test(t)) return 'sap';
  return 'process';
}
function assembleFromLines(target, lines, assign){
  var get=function(f){ var p=[]; lines.forEach(function(ln,i){ if(assign[i]===f) p.push(ln); }); return joinNE.apply(null,p); };
  if(target==='todo'){ var tx=get('text'); return tx?{_kind:'todo', text:tx}:null; }
  if(target==='queries'){ var q=get('q'); return q?{_kind:'q', q:q, note:get('note')}:null; }
  if(target && target.indexOf('sec:')===0){ var ti=get('title'), bo=get('body'); return (ti||bo)?{_kind:'sec', sid:target.slice(4), title:ti, body:bo}:null; }
  if(target==='tc'){
    var code=get('code'); if(!code) return null;
    return {code:code, cat:get('cat')||'Imported', desc:get('desc')};
  }
  var name=get('name'); if(!name) return null;
  var day=null, dstr=get('day'); if(dstr){ var m=String(dstr).match(/\b(\d{1,2})\b/); if(m&&+m[1]>=1&&+m[1]<=31) day=+m[1]; }
  return {name:name, day:day, process:get('process'), sap:get('sap'), when:get('when'), timing:get('timing'), sent:get('sent'), contact:get('contact'), extra:get('extra')};
}

  lpFired=false; clearTimeout(lpTimer2);
  var val=el.dataset.lp;
  lpTimer2=setTimeout(function(){ lpFired=true; if(navigator.vibrate) navigator.vibrate(15); handleLongPressPic(val); }, 500);
}, {passive:true});
app.addEventListener('touchend', function(){ clearTimeout(lpTimer2); });
app.addEventListener('touchmove', function(){ clearTimeout(lpTimer2); });
app.addEventListener('contextmenu', function(e){ var el=e.target.closest('[data-lp]'); if(el){ e.preventDefault(); lpFired=true; handleLongPressPic(el.dataset.lp); } });
document.addEventListener('change', function(e){
  if(e.target.id!=='picFile') return;
  var f=e.target.files[0]; if(!f) return; e.target.value='';
  if((mem.pics||[]).length>=15){ toast('Picture limit reached (15). Delete one first.'); return; }
  var rd=new FileReader();
  rd.onload=function(){
    var img=new Image();
    img.onload=function(){
      var max=700, w=img.width, h=img.height;
      if(w>h && w>max){ h=Math.round(h*max/w); w=max; }
      else if(h>=w && h>max){ w=Math.round(w*max/h); h=max; }
      var cv=document.createElement('canvas'); cv.width=w; cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      var data;
      try{ data=cv.toDataURL('image/jpeg',0.55); }catch(err){ toast("Couldn't process that image"); return; }
      mem.pics=mem.pics||[];
      var fld = (picFolder && picFolder!=='all' && picFolder!=='unfiled') ? picFolder : '';
      mem.pics.unshift({id:'PIC-'+Date.now(), name:'Screenshot '+(mem.pics.length+1), data:data, ts:Date.now(), folder:fld});
      save(); toast('Picture saved'); render();
    };
    img.onerror=function(){ toast("Couldn't read that image"); };
    img.src=rd.result;
  };
  rd.readAsDataURL(f);
});
document.addEventListener('change', e=>{
  if(e.target.id!=='imgFile') return;
  const f=e.target.files[0]; if(!f) return;
  const target=(document.getElementById('imgTarget')||{}).value||'pay';
  e.target.value='';
  toast("Reading image\u2026 first time may take a bit");
  Tesseract.recognize(f,'eng').then(res=>{
    const text=(res && res.data && res.data.text ? res.data.text : '').trim();
    if(!text){ toast("Couldn't read any text"); return; }
    photoMap(target, text);
  }).catch(()=>toast("Couldn't read that image"));
});

refreshRing();
render();
</script>
<!-- ===== Auto-backup to GitHub + status badge ===== -->
<script>
(function () {
  var WORKER_URL = "https://payroll-backup.banerjee-tara.workers.dev";
  var TOKEN      = "tarabackup2026";
  var STATE_KEY  = "payrollLearn_v1";

  function hash(s){var h=5381;for(var i=0;i<s.length;i++){h=((h<<5)+h+s.charCodeAt(i))|0;}return h.toString(36);}

  function relTime(iso){
    if(!iso) return {txt:"never", state:"off"};
    var d=Math.floor((Date.now()-new Date(iso).getTime())/86400000);
    if(d<=0) return {txt:"today", state:"ok"};
    if(d===1) return {txt:"yesterday", state:"warn"};
    return {txt:d+"d ago", state:(d<=3?"warn":"off")};
  }

  function paint(msg){
    var b=document.getElementById("bkpBadge"); if(!b) return;
    if(msg){ b.textContent=msg; b.style.color="#C0392B"; return; }
    var r=relTime(localStorage.getItem("lastBackupAt"));
    b.style.color = r.state==="ok" ? "#1F8A4C" : r.state==="warn" ? "#B07500" : "#C0392B";
    b.textContent = "\u2601 backup: " + r.txt;
  }

  async function backup(){
    try{
      var raw=localStorage.getItem(STATE_KEY);
      if(!raw){ paint("\u2601 no data yet"); return; }
      var sig=hash(raw);
      if(localStorage.getItem("lastBackupHash")===sig){ paint(); return; }
      var res=await fetch(WORKER_URL,{
        method:"POST",
        headers:{"Content-Type":"application/json","x-token":TOKEN},
        body:JSON.stringify({data:raw})
      });
      if(res.ok){
        localStorage.setItem("lastBackupHash",sig);
        localStorage.setItem("lastBackupAt",new Date().toISOString());
      }
    }catch(e){}
    paint();
  }

  function makeBadge(){
    if(document.getElementById("bkpBadge")) return;
    var b=document.createElement("div");
    b.id="bkpBadge";
    b.style.cssText="position:fixed;left:10px;bottom:calc(76px + env(safe-area-inset-bottom));z-index:99999;"+
      "font:600 11px/1 'Hanken Grotesk',system-ui,sans-serif;background:rgba(251,246,240,.94);"+
      "border:1px solid rgba(35,26,21,.12);border-radius:999px;padding:6px 10px;"+
      "box-shadow:0 1px 4px rgba(35,26,21,.14);color:#6B5E56;-webkit-backdrop-filter:blur(4px);"+
      "backdrop-filter:blur(4px);cursor:pointer;user-select:none;-webkit-user-select:none;";
    b.title="Tap to back up now";
    b.textContent="\u2601 backup: \u2026";
    b.addEventListener("click",function(){
      b.textContent="\u2601 backing up\u2026";
      localStorage.removeItem("lastBackupHash");
      backup();
    });
    document.body.appendChild(b);
    paint();
  }

  function start(){ makeBadge(); setTimeout(backup,1500); }
  if(document.readyState==="complete"||document.readyState==="interactive") start();
  else window.addEventListener("load",start);

  window.forceBackup=function(){ localStorage.removeItem("lastBackupHash"); backup(); };
})();
</script>
