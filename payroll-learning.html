<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#F26722">
<title>Payroll Learning</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
 --orange:#F26722; --orange-deep:#C74E12; --ink:#231A15; --ink-soft:#6B5E56;
 --paper:#FBF6F0; --card:#FFFFFF; --line:#EBDFD4;
 --green:#1F8A4C; --green-bg:#E3F3E9; --amber:#B07500; --amber-bg:#FBF0D9;
 --red:#C0392B; --red-bg:#FBE5E1; --blue:#2E75B6; --blue-bg:#E4EEF8;
 --r:14px; --shadow:0 1px 3px rgba(35,26,21,.08);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{-webkit-text-size-adjust:100%}
body{font-family:'Hanken Grotesk',system-ui,sans-serif;background:var(--paper);color:var(--ink);
 padding-bottom:calc(72px + env(safe-area-inset-bottom));font-size:15px;line-height:1.45}
h1,h2,h3,.serif{font-family:'Fraunces',Georgia,serif}
button{font:inherit;border:none;background:none;cursor:pointer;color:inherit}
a{color:var(--blue)}
header{position:sticky;top:0;z-index:40;background:var(--orange);color:#fff;
 padding:calc(10px + env(safe-area-inset-top)) 16px 12px}
.hrow{display:flex;align-items:center;gap:12px}
.hride{flex:1;min-width:0}
header h1{font-size:20px;font-weight:700}
header .sub{font-size:11.5px;opacity:.9;margin-top:1px}
.ring{position:relative;width:48px;height:48px;flex:none}
.ring svg{transform:rotate(-90deg)}
.ring .pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
.hbtn{width:34px;height:34px;border-radius:10px;background:rgba(255,255,255,.18);color:#fff;
 font-size:16px;font-weight:700;flex:none;display:flex;align-items:center;justify-content:center}
.searchwrap{padding:10px 16px 4px}
.search{width:100%;padding:11px 14px;border-radius:12px;border:1.5px solid var(--line);
 background:var(--card);font:inherit;font-size:15px;box-shadow:var(--shadow)}
.search:focus{outline:none;border-color:var(--orange)}
main{padding:8px 14px 24px}
.section-title{font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
 color:var(--ink-soft);margin:18px 2px 8px}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r);
 box-shadow:var(--shadow);margin-bottom:10px;overflow:hidden}
.chead{display:flex;align-items:flex-start;gap:10px;padding:13px 14px;width:100%;text-align:left}
.cid{font-size:10.5px;font-weight:700;color:var(--orange-deep);letter-spacing:.06em;flex:none;
 background:#FDEDE3;border-radius:6px;padding:3px 6px;margin-top:1px}
.ctitle{flex:1;font-weight:600;font-size:14.5px;line-height:1.35}
.cday{font-size:11px;color:var(--ink-soft);margin-top:2px;font-weight:500}
.chev{flex:none;color:var(--ink-soft);transition:transform .2s;margin-top:2px}
.card.open .chev{transform:rotate(90deg)}
.cbody{display:none;padding:0 14px 14px;border-top:1px dashed var(--line)}
.card.open .cbody{display:block}
.pblock{white-space:pre-wrap;font-size:13.5px;line-height:1.5;color:#3E332C;
 background:#FBF6F0;border-radius:10px;padding:11px 12px;margin-top:10px;word-break:break-word}
.sapblock{background:#F0F5FB;border-left:3px solid var(--blue)}
.saptag{display:block;font-size:11px;font-weight:800;letter-spacing:.08em;color:var(--blue);margin-bottom:6px}
.meta{font-size:12.5px;color:var(--ink-soft);margin-top:8px}
.meta b{color:var(--ink)}
.chips{display:flex;gap:8px;align-items:center;margin-top:12px;flex-wrap:wrap}
.chip{padding:7px 13px;border-radius:999px;font-size:12.5px;font-weight:700}
.chip.ns{background:var(--red-bg);color:var(--red)}
.chip.ip{background:var(--amber-bg);color:var(--amber)}
.chip.ln{background:var(--green-bg);color:var(--green)}
.datechip{font-size:11.5px;color:var(--ink-soft)}
.notes{width:100%;margin-top:10px;padding:9px 11px;border-radius:10px;border:1.5px solid var(--line);
 font:inherit;font-size:13px;min-height:38px;resize:vertical;background:#fff}
.notes:focus{outline:none;border-color:var(--orange)}
.sdot{width:10px;height:10px;border-radius:50%;flex:none;margin-top:6px}
.sdot.ns{background:var(--red)}.sdot.ip{background:var(--amber)}.sdot.ln{background:var(--green)}
.tcline{margin-top:8px;display:flex;flex-wrap:wrap;gap:5px}
.tct{font-size:10.5px;font-weight:700;background:#EFE7FA;color:#5B21B6;border-radius:6px;padding:3px 7px}
.cal{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;padding:4px 0 8px}
.dcell{border-radius:12px;background:var(--card);border:1.5px solid var(--line);
 padding:7px 2px 6px;text-align:center;min-height:52px;position:relative}
.dcell .dn{font-family:'Fraunces',serif;font-size:15px;font-weight:700}
.dcell .dd{display:flex;gap:3px;justify-content:center;margin-top:4px;flex-wrap:wrap;min-height:8px}
.dcell .dd i{width:7px;height:7px;border-radius:50%;display:block}
.dcell.has{border-color:#E8C9AF}
.dcell.sel{border-color:var(--orange);background:#FDEDE3;box-shadow:0 0 0 2px rgba(242,103,34,.25)}
.dcell.mute{opacity:.35}
.dcell .dc{position:absolute;top:3px;right:5px;font-size:9px;font-weight:800;color:var(--orange-deep)}
.flexbtn{width:100%;margin:2px 0 10px;padding:11px;border-radius:12px;border:1.5px dashed var(--orange-deep);
 background:#FDEDE3;color:var(--orange-deep);font-weight:700;font-size:13.5px}
.flexbtn.sel{background:var(--orange);color:#fff;border-style:solid}
.addbtn{width:100%;margin:2px 0 12px;padding:12px;border-radius:12px;border:1.5px dashed var(--line);
 background:var(--card);color:var(--orange-deep);font-weight:700;font-size:13.5px}
.addform{padding:6px 14px 14px}
.addform input,.addform textarea{width:100%;margin-top:8px;padding:10px 12px;border-radius:10px;
 border:1.5px solid var(--line);font:inherit;font-size:14px;background:#fff}
.addform textarea{min-height:70px;resize:vertical}
.addform input:focus,.addform textarea:focus{outline:none;border-color:var(--orange)}
.formrow{display:flex;gap:8px;margin-top:10px}
.savebtn{flex:1;padding:12px;border-radius:12px;background:var(--orange);color:#fff;font-weight:700;font-size:14px}
.cancelbtn{flex:1;padding:12px;border-radius:12px;background:var(--paper);color:var(--ink-soft);font-weight:700;font-size:14px;border:1.5px solid var(--line)}
.delbtn{font-size:12px;font-weight:700;color:var(--red);margin-top:10px}
.qrow{display:flex;gap:10px;padding:12px 14px;align-items:flex-start}
.qtext{flex:1;font-size:14px;line-height:1.4}
.qnote{font-size:12px;color:var(--ink-soft);margin-top:3px;white-space:pre-wrap}
.qbtn{flex:none;padding:7px 12px;border-radius:999px;font-size:12px;font-weight:700}
.qbtn.open{background:var(--red-bg);color:var(--red)}
.qbtn.closed{background:var(--green-bg);color:var(--green)}
.ansbox{width:100%;margin:0 0 10px;padding:8px 11px;border-radius:10px;border:1.5px solid var(--line);font:inherit;font-size:13px;background:#fff}
.gcard{padding:13px 14px}
.gcov{font-size:11px;font-weight:800;letter-spacing:.05em;border-radius:6px;padding:3px 8px;display:inline-block}
.gcov.NOTCOVERED{background:var(--red-bg);color:var(--red)}
.gcov.Partly{background:var(--amber-bg);color:var(--amber)}
.gcov.Covered{background:var(--green-bg);color:var(--green)}
.gwhere{font-size:12.5px;color:var(--ink-soft);margin-top:6px}
.vcard{padding:13px 14px}
.vt{font-weight:700;font-size:14px}
.vtag{font-size:11px;color:var(--orange-deep);font-weight:700;margin-top:2px}
.vc{font-size:13px;color:var(--ink-soft);margin-top:4px}
.vlink{display:inline-block;margin-top:8px;font-size:13px;font-weight:700;color:#fff;background:var(--orange);border-radius:9px;padding:7px 14px}
.icard{padding:13px 14px}
.icard .in{font-family:'Fraunces',serif;font-size:15px;font-weight:700;color:var(--orange-deep)}
.icard p{font-size:13.5px;margin-top:5px;color:#3E332C}
nav{position:fixed;bottom:0;left:0;right:0;z-index:50;background:#fff;border-top:1px solid var(--line);
 display:flex;padding-bottom:env(safe-area-inset-bottom)}
nav button{flex:1;padding:9px 0 7px;display:flex;flex-direction:column;align-items:center;gap:2px;
 font-size:10.5px;font-weight:600;color:var(--ink-soft)}
nav button.on{color:var(--orange-deep)}
nav .ico{font-size:19px;line-height:1}
.morelist{padding:4px 0}
.morelist button{display:flex;width:100%;text-align:left;padding:15px 16px;gap:12px;align-items:center;
 border-bottom:1px solid var(--line);font-size:15px;font-weight:600;background:var(--card)}
.morelist .mic{font-size:20px;width:28px;text-align:center}
.morelist .mcount{margin-left:auto;font-size:12px;color:var(--ink-soft);font-weight:500}
.back{display:inline-flex;align-items:center;gap:6px;font-size:13.5px;font-weight:700;color:var(--orange-deep);margin:6px 0 4px;padding:6px 2px}
.empty{padding:36px 16px;text-align:center;color:var(--ink-soft);font-size:14px}
.toast{position:fixed;left:50%;bottom:calc(86px + env(safe-area-inset-bottom));transform:translateX(-50%);
 background:var(--ink);color:#fff;font-size:13px;font-weight:600;padding:9px 18px;border-radius:999px;
 opacity:0;transition:opacity .25s;pointer-events:none;z-index:60;white-space:nowrap}
.toast.show{opacity:1}
.hint{font-size:12.5px;color:var(--ink-soft);background:#F4EADF;border-radius:10px;padding:10px 12px;margin:4px 0 12px;line-height:1.45}
.sudlist{counter-reset:s}
.sudlist .card{padding:12px 14px;display:flex;gap:12px}
.sudlist .card::before{counter-increment:s;content:counter(s);font-family:'Fraunces',serif;font-weight:700;color:var(--orange);font-size:15px;flex:none;width:22px}
.vrow{padding:12px 14px}
.vlabel{font-weight:700;font-size:14px}
.vfield{display:flex;gap:8px;align-items:center;margin-top:6px;font-size:13px}
.vfield .vk{color:var(--ink-soft);width:58px;flex:none}
.vfield .vv{font-family:ui-monospace,Menlo,monospace;flex:1;word-break:break-all}
.veye{flex:none;font-size:15px;padding:4px 8px;border-radius:8px;background:var(--paper)}
@media (min-width:700px){main,.searchwrap{max-width:640px;margin:0 auto}}
</style>
</head>

const STATUSES = ["Not Started","In Progress","Learned"];
const SCLASS = {"Not Started":"ns","In Progress":"ip","Learned":"ln"};

/* ---------- store ---------- */
let mem = {status:{}, notes:{}, queries:{}, qans:{}, vault:[], custom:{pay:[], other:[], sap:[]}, edits:{}, deleted:{}, tc:{custom:[], edits:{}, deleted:{}}};
function load(){
  try{ const raw = localStorage.getItem('payrollLearn_v1'); if(raw){ const p=JSON.parse(raw);
    mem = Object.assign(mem, p);
    mem.custom = Object.assign({pay:[],other:[],sap:[]}, p.custom||{});
    mem.edits = p.edits||{}; mem.deleted = p.deleted||{};
    mem.tc = Object.assign({custom:[], edits:{}, deleted:{}}, p.tc||{});
  }}catch(e){}
}
function save(){ try{ localStorage.setItem('payrollLearn_v1', JSON.stringify(mem)); }catch(e){} }
load();
function getStatus(id){ return (mem.status[id]&&mem.status[id].s) || "Not Started"; }
function getDate(id){ return (mem.status[id]&&mem.status[id].d) || ""; }
function setStatus(id, s){
  mem.status[id] = {s:s, d: s==="Learned" ? todayStr() : (s==="Not Started"?"":(getDate(id)||todayStr()))};
  save(); refreshRing();
}
function todayStr(){
  const dt=new Date(); const m=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  return dt.getDate()+"-"+m[dt.getMonth()]+"-"+dt.getFullYear();
}

/* ---------- helpers ---------- */
const app = document.getElementById('app');
let tab = 'cal'; let sub = null; let query = ''; let selDay = null; let addOpen = null;
const openCards = new Set();
function esc(s){ return (s==null?"":String(s)).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function toast(msg){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(t._x); t._x=setTimeout(()=>t.classList.remove('show'),1400);
}
function matches(text){ return !query || (text||"").toLowerCase().includes(query); }

/* custom items + edits */
function customList(kind){ return (mem.custom && mem.custom[kind]) || []; }
function eff(x){ const o = mem.edits[x.id]; return o ? Object.assign({}, x, o) : x; }
function isDel(id){ return !!mem.deleted[id]; }

/* ---------- T-code store (base list + user edits/deletes/custom rows) ---------- */
function tcEff(t){ const o = mem.tc.edits[t.id]; return o ? Object.assign({}, t, o) : t; }
function tcBaseList(){ return D.tcodes.filter(t=>!mem.tc.deleted[t.id]).map(tcEff); }
function tcAllList(){ return tcBaseList().concat(mem.tc.custom); }
function tcFindByCode(code){
  const norm = (code||"").trim().toLowerCase();
  return tcAllList().find(t=>(t.code||"").trim().toLowerCase()===norm);
}
function tcSaveEdit(id, patch){
  const ci = mem.tc.custom.findIndex(c=>c.id===id);
  if(ci>=0) Object.assign(mem.tc.custom[ci], patch);
  else mem.tc.edits[id] = Object.assign(mem.tc.edits[id]||{}, patch);
  save();
}
function tcDelete(id){
  if(!confirm('Delete this T-code entry?')) return;
  const ci = mem.tc.custom.findIndex(c=>c.id===id);
  if(ci>=0) mem.tc.custom.splice(ci,1);
  else mem.tc.deleted[id] = true;
  save(); toast("Deleted"); render();
}
function tcAddNew(cat, code, desc){
  const id = 'TCX-'+Date.now()+'-'+Math.floor(Math.random()*1000);
  mem.tc.custom.push({id:id, cat:(cat||"").trim(), code:(code||"").trim(), desc:(desc||"").trim()});
  save();
}
function importTcodesFromExcel(file){
  const reader = new FileReader();
  reader.onload = function(e){
    try{
      const data = new Uint8Array(e.target.result);
      const wb = XLSX.read(data, {type:'array'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:""});
      if(!rows.length){ toast("Empty sheet"); return; }
      // find header row + column indices (Category / T-Code / Description), tolerant of naming
      let hIdx = 0, cCat=-1, cCode=-1, cDesc=-1;
      for(let r=0; r<Math.min(rows.length,5); r++){
        const row = rows[r].map(v=>String(v||"").trim().toLowerCase());
        const ci = row.findIndex(v=>v.includes('categor'));
        const ti = row.findIndex(v=>v.includes('t-code')||v.includes('tcode')||v===('t code'));
        const di = row.findIndex(v=>v.includes('desc'));
        if(ti>=0){ hIdx=r; cCat=ci; cCode=ti; cDesc=di; break; }
      }
      if(cCode<0){ cCat=0; cCode=1; cDesc=2; hIdx=0; } // fallback: assume same layout, no header match found
      let lastCat = '', added=0, updated=0;
      for(let r=hIdx+1; r<rows.length; r++){
        const row = rows[r];
        const codeRaw = cCode>=0 ? row[cCode] : "";
        const code = String(codeRaw||"").trim();
        if(!code) continue;
        const catRaw = cCat>=0 ? row[cCat] : "";
        if(String(catRaw||"").trim()) lastCat = String(catRaw).trim();
        const desc = cDesc>=0 ? String(row[cDesc]||"").trim() : "";
        const existing = tcFindByCode(code);
        if(existing){
          tcSaveEdit(existing.id, {cat:lastCat, code:code, desc:desc});
          updated++;
        } else {
          tcAddNew(lastCat, code, desc);
          added++;
        }
      }
      save(); render();
      toast(added+" added, "+updated+" updated");
    }catch(err){ toast("Could not read that file"); }
  };
  reader.readAsArrayBuffer(file);
}
function allTrackIds(){
  return D.pd.map(x=>x.id).concat(D.op.map(x=>x.id))
    .concat(customList('pay').map(x=>x.id)).concat(customList('other').map(x=>x.id))
    .filter(id=>!isDel(id));
}
function refreshRing(){
  const ids = allTrackIds();
  const learned = ids.filter(i=>getStatus(i)==="Learned").length;
  const pct = ids.length ? Math.round(100*learned/ids.length) : 0;
  document.getElementById('ringFg').style.strokeDashoffset = 125.6*(1-(ids.length?learned/ids.length:0));
  document.getElementById('ringPct').textContent = pct+"%";
  document.getElementById('hsub').textContent =
    learned+" of "+ids.length+" works learned \u00b7 "+
    ids.filter(i=>getStatus(i)==="In Progress").length+" in progress";
}

/* day helpers */
function itemDays(x){
  if(x.days) return x.days;
  if(x.custom) return [];
  return D.dayMap[x.id] || [];
}
function dayLabelOf(x){
  if(x.days && x.days.length) return x.days.map(ordJs).join("\u2013");
  if(x.custom) return "Flexible";
  return D.dayLabel[x.id] || "";
}
function ordJs(n){ const s=["th","st","nd","rd"], v=n%100; return n+(s[(v-20)%10]||s[v]||s[0]); }
function allDayItems(){
  const arr = [];
  D.pd.forEach(x=>{ if(!isDel(x.id)) arr.push(Object.assign({cat:'Payroll'}, eff(x))); });
  D.op.forEach(x=>{ if(!isDel(x.id)) arr.push(Object.assign({cat:'Other'}, eff(x))); });
  customList('pay').forEach(x=>{ if(!isDel(x.id)) arr.push(Object.assign({cat:'Payroll',custom:true},x)); });
  customList('other').forEach(x=>{ if(!isDel(x.id)) arr.push(Object.assign({cat:'Other',custom:true},x)); });
  return arr;
}

function editForm(x, kind){
  const isSap = kind==='sap';
  const proc = isSap ? (x.steps||'') : (kind==='pay' ? (x.process||'') : (x.details||''));
  const days = itemDays(x);
  return '<div class="addform" style="padding:0 0 4px">'+
    '<input id="efTitle" value="'+esc(x.activity)+'" placeholder="Work name">'+
    (isSap?'':'<input id="efDate" inputmode="numeric" value="'+(days.length?days[0]:'')+'" placeholder="Date of month (1-31, blank = flexible)">')+
    '<textarea id="efProc" placeholder="'+(isSap?'SAP steps':'Process')+'">'+esc(proc)+'</textarea>'+

    '<button class="cancelbtn" data-editcancel="1">Cancel</button></div></div>';
}
function saveEdit(kind, id){
  const t = (document.getElementById('efTitle')||{}).value||'';
  if(!t.trim()){ toast("Name needed"); return; }
  const proc = (document.getElementById('efProc')||{}).value||'';
  const sEl = document.getElementById('efSap');
  const dEl = document.getElementById('efDate');
  const d = dEl ? parseInt(dEl.value,10) : NaN;
  const patch = { activity: t.trim() };
  if(kind==='sap') patch.steps = proc;
  else {
    if(kind==='pay') patch.process = proc; else patch.details = proc;
    patch.sap = sEl ? sEl.value : '';
    patch.days = (!isNaN(d) && d>=1 && d<=31) ? [d] : [];
  }
  const cl = customList(kind);
  const ci = cl.findIndex(c=>c.id===id);
  if(ci >= 0){ Object.assign(cl[ci], patch); }
  else { mem.edits[id] = Object.assign(mem.edits[id]||{}, patch); }
  save(); editOpen = null; toast("Saved"); render();
}
function delItem(kind, id){
  if(!confirm('Delete this work? (Restore is only possible via a backup import)')) return;
  const cl = customList(kind);
  const ci = cl.findIndex(c=>c.id===id);
  if(ci >= 0) cl.splice(ci,1); else mem.deleted[id] = true;
  save(); toast("Deleted"); render();
}

function saveCustom(kind){
  const t = (document.getElementById('afTitle')||{}).value||''; 
  if(!t.trim()){ toast("Name needed"); return; }
  const proc = (document.getElementById('afProc')||{}).value||'';
  const dEl = document.getElementById('afDate');
  const sEl = document.getElementById('afSap');
  const d = dEl ? parseInt(dEl.value,10) : NaN;

/* ---------- Calendar tab ---------- */
function dayActsAll(dn){
  return allDayItems().filter(x => dn==='flex' ? itemDays(x).length===0 : itemDays(x).includes(dn));
}
function renderCal(){
  let cal = '<div class="cal">';
  for(let dn=1; dn<=31; dn++){
    const here = dayActsAll(dn);
    const cls = ['dcell']; if(here.length)cls.push('has'); else cls.push('mute');
    if(selDay===dn)cls.push('sel');
    cal += '<button class="'+cls.join(' ')+'" data-day="'+dn+'">'+
      (here.length?'<span class="dc">'+here.length+'</span>':'')+
      '<div class="dn">'+dn+'</div><div class="dd">'+
      here.slice(0,6).map(i=>'<i style="background:var(--'+({ns:'red',ip:'amber',ln:'green'})[SCLASS[getStatus(i.id)]]+')"></i>').join('')+
      '</div></button>';
  }
  cal += '</div>';
  const flexN = dayActsAll('flex').length;
  cal += '<button class="flexbtn'+(selDay==='flex'?' sel':'')+'" data-day="flex">Flexible / no fixed date \u00b7 '+flexN+'</button>';
  let html = '<div class="section-title">Payroll calendar \u00b7 press a date</div>'+cal;

  if(selDay===null && !query){
    html += '<div class="hint" style="text-align:center">Press a date to see that day\u2019s work.<br>Dot colours = your learning status.</div>';
    app.innerHTML = html; return;
  }
  let items;
  if(query && selDay===null){ items = allDayItems(); html += '<div class="section-title">Search results</div>'; }
  else if(selDay==='flex'){ items = dayActsAll('flex'); html += '<div class="section-title">Flexible \u00b7 '+items.length+'</div>'; }
  else { items = dayActsAll(selDay); html += '<div class="section-title">Day '+selDay+' \u00b7 '+items.length+' works</div>'; }
  let shown=0;
  items.forEach(x=>{
    const hay = x.id+" "+x.activity+" "+(x.process||x.details||"")+" "+(x.sap||"")+" "+((x.tc||[]).join(" "));
    if(!matches(hay)) return; shown++;
    html += actCard(x, dayLabelOf(x)+' \u00b7 '+x.cat, x.cat==='Payroll'?pdBody(x):opBody(x));
  });
  if(!shown) html += '<div class="empty">'+(selDay?'No work on this day.':'Nothing matches.')+'</div>';
  app.innerHTML = html;
}

/* ---------- Payroll / Other / SAP tabs ---------- */
function renderList(kind){
  const conf = {
    pay:   {title:'Payroll works \u00b7 press any work to open its SAP', base:D.pd, body:pdBody},
    other: {title:'Other than payroll', base:D.op, body:opBody},
    sap:   {title:'SAP \u00b7 as in your sheet', base:D.st, body:stBody},
  }[kind];
  let html = '<div class="section-title">'+conf.title+'</div>' + addForm(kind);
  let shown=0;
  conf.base.forEach(x0=>{
    if(isDel(x0.id)) return;
    const x = eff(x0);
    const hay = x.id+" "+x.activity+" "+(x.process||x.details||x.steps||"")+" "+(x.sap||"")+" "+((x.tc||[]).join(" "));
    if(!matches(hay)) return; shown++;
    html += actCard(x, kind==='sap'?'':dayLabelOf(x), conf.body(x));
  });
  customList(kind).forEach(x=>{
    if(isDel(x.id)) return;
    const hay = x.activity+" "+(x.process||x.details||x.steps||"")+" "+(x.sap||"");
    if(!matches(hay)) return; shown++;
    const xc = Object.assign({custom:true},x);
    html += actCard(xc, kind==='sap'?'':dayLabelOf(xc), conf.body(xc));
  });
  if(!shown) html+='<div class="empty">Nothing matches.</div>';
  app.innerHTML = html;
}

    let html = backBtn()+'<div class="section-title">Ways to get more from this</div>';
    D.ideas.forEach((it,i)=>{
      if(!matches(it[0]+" "+it[1])) return;
      html += '<div class="card icard"><div class="in">'+(i+1)+'. '+esc(it[0])+'</div><p>'+esc(it[1])+'</p></div>';
    });
    app.innerHTML = html; return;
  }
}

/* ---------- dispatch ---------- */
function render(){
  if(tab==='cal') renderCal();
  else if(tab==='more') renderMore();
  else renderList(tab);
  openCards.forEach(id=>{
    const c = app.querySelector('[data-card="'+id+'"]'); if(c) c.classList.add('open');
  });
  document.querySelectorAll('nav button').forEach(b=>b.classList.toggle('on', b.dataset.t===tab));
}

/* ---------- events ---------- */
document.getElementById('nav').addEventListener('click', e=>{
  const b = e.target.closest('button'); if(!b) return;
  tab = b.dataset.t; sub = null; addOpen = null; editOpen = null; render(); window.scrollTo(0,0);
});
document.getElementById('q').addEventListener('input', e=>{
  query = e.target.value.trim().toLowerCase(); render();
});
app.addEventListener('click', e=>{
  const tgl = e.target.closest('[data-toggle]');
  if(tgl){ const id=tgl.dataset.toggle;
    const card=tgl.closest('.card'); card.classList.toggle('open');
    if(card.classList.contains('open')) openCards.add(id); else openCards.delete(id);
    return; }
  const cyc = e.target.closest('[data-cycle]');
  if(cyc){ const id=cyc.dataset.cycle;
    const next = STATUSES[(STATUSES.indexOf(getStatus(id))+1)%3];
    setStatus(id, next); toast(next); render(); return; }
  const dc = e.target.closest('[data-day]');
  if(dc){ const d = dc.dataset.day==='flex' ? 'flex' : parseInt(dc.dataset.day,10);
    selDay = (selDay===d) ? null : d; render(); return; }
  const ao = e.target.closest('[data-addopen]');
  if(ao){ addOpen = ao.dataset.addopen; render(); return; }
  const ac = e.target.closest('[data-addcancel]');
  if(ac){ addOpen = null; render(); return; }
  const as = e.target.closest('[data-addsave]');
  if(as){ saveCustom(as.dataset.addsave); return; }
  const ed = e.target.closest('[data-edit]');
  if(ed){ const [,id]=ed.dataset.edit.split(/:(.+)/); editOpen = id; openCards.add(id); render(); return; }
  const ec = e.target.closest('[data-editcancel]');
  if(ec){ editOpen = null; render(); return; }
  const es = e.target.closest('[data-editsave]');
  if(es){ const [k,id]=es.dataset.editsave.split(/:(.+)/); saveEdit(k,id); return; }
  const dl = e.target.closest('[data-del]');
  if(dl){ const [k,id]=dl.dataset.del.split(/:(.+)/); delItem(k,id); return; }
  const tce = e.target.closest('[data-tcedit]');
  if(tce){ editOpen = tce.dataset.tcedit; render(); return; }
  const tcec = e.target.closest('[data-tceditcancel]');
  if(tcec){ editOpen = null; render(); return; }
  const tces = e.target.closest('[data-tceditsave]');
  if(tces){
    const id = tces.dataset.tceditsave;
    const code = (document.getElementById('tcfCode')||{}).value||'';
    if(!code.trim()){ toast("T-Code needed"); return; }
    tcSaveEdit(id, {
      cat: (document.getElementById('tcfCat')||{}).value||'',
      code: code.trim(),
      desc: (document.getElementById('tcfDesc')||{}).value||''
    });
    editOpen = null; toast("Saved"); render(); return;
  }
  const tcd = e.target.closest('[data-tcdel]');
  if(tcd){ tcDelete(tcd.dataset.tcdel); return; }
  const tcao = e.target.closest('[data-tcaddopen]');
  if(tcao){ addOpen = 'tc'; render(); return; }
  const tcac = e.target.closest('[data-tcaddcancel]');
  if(tcac){ addOpen = null; render(); return; }
  const tcas = e.target.closest('[data-tcaddsave]');
  if(tcas){
    const code = (document.getElementById('tcfNewCode')||{}).value||'';
    if(!code.trim()){ toast("T-Code needed"); return; }
    tcAddNew(
      (document.getElementById('tcfNewCat')||{}).value||'',
      code,
      (document.getElementById('tcfNewDesc')||{}).value||''
    );
    addOpen = null; toast("Added"); render(); return;
  }
  const tcup = e.target.closest('[data-tcupload]');
  if(tcup){ document.getElementById('tcFileImport').click(); return; }
  const ms = e.target.closest('[data-sub]');
  if(ms){ sub = ms.dataset.sub; render(); return; }
  const bk = e.target.closest('[data-back]');
  if(bk){ sub = null; render(); return; }
  const qb = e.target.closest('[data-q]');
  if(qb){ const id=qb.dataset.q;
    mem.queries[id] = mem.queries[id]==="Closed" ? "Open" : "Closed";
    save(); toast(id+" "+mem.queries[id]); render(); return; }
  const ve = e.target.closest('[data-veye]');
  if(ve){ const i=+ve.dataset.veye; mem.vault[i]._show=!mem.vault[i]._show; render(); return; }
  const vd = e.target.closest('[data-vdel]');
  if(vd){ const i=+vd.dataset.vdel;
    if(confirm('Delete "'+(mem.vault[i].label||'entry')+'"?')){ mem.vault.splice(i,1); save(); toast("Deleted"); render(); }
    return; }
  const va = e.target.closest('[data-vadd]');
  if(va){
    const L=document.getElementById('vfL').value.trim();
    const P=document.getElementById('vfP').value;
    if(!L||!P){ toast("Details and password needed"); return; }
    mem.vault.push({label:L,user:document.getElementById('vfU').value.trim(),pass:P});
    save(); toast("Saved to vault"); render(); return; }
});
app.addEventListener('input', e=>{
  const n = e.target.closest('[data-note]');
  if(n){ mem.notes[n.dataset.note]=n.value; save(); return; }
  const qa = e.target.closest('[data-qa]');
  if(qa){ mem.qans[qa.dataset.qa]=qa.value; save(); return; }
});
document.getElementById('btnExport').addEventListener('click', ()=>{
  const blob = new Blob([JSON.stringify(mem,null,1)],{type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'payroll-learning-backup.json';
  a.click(); toast("Backup downloaded");
});
document.getElementById('btnImport').addEventListener('click', ()=>document.getElementById('fileImport').click());
document.getElementById('fileImport').addEventListener('change', e=>{
  const f = e.target.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = ()=>{ try{ const p=JSON.parse(r.result); mem = Object.assign(mem, p);
      mem.custom = Object.assign({pay:[],other:[],sap:[]}, p.custom||{});
      mem.edits = p.edits||{}; mem.deleted = p.deleted||{};
      mem.tc = Object.assign({custom:[], edits:{}, deleted:{}}, p.tc||{});
      save(); refreshRing(); render(); toast("Backup restored"); }
    catch(err){ toast("Not a valid backup file"); } };
  r.readAsText(f);
});
document.getElementById('tcFileImport').addEventListener('change', e=>{
  const f = e.target.files[0]; if(!f) return;
  importTcodesFromExcel(f);
  e.target.value = '';
});

refreshRing();
render();
</script>
</body>
</html>
